name: GoReleaser Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - uses: goreleaser/goreleaser-action@v5
        with:
          version: ">=2.0.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          set -e
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NO_V=${VERSION#v}
          
          # Clone the homebrew tap repo
          git clone https://${{ secrets.GORELEASER_GITHUB_TOKEN }}@github.com/gopinath-langote/homebrew-one-build.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          
          # Download checksums
          curl -sL https://github.com/gopinath-langote/1build/releases/download/$VERSION/1build_${VERSION_NO_V}_checksums.txt -o checksums.txt
          
          # Parse checksums
          SHA_X86_64_DARWIN=$(awk '/1build_Darwin_x86_64\.tar\.gz/ {print $1}' checksums.txt)
          SHA_ARM64_DARWIN=$(awk '/1build_Darwin_arm64\.tar\.gz/ {print $1}' checksums.txt)
          SHA_X86_64_LINUX=$(awk '/1build_Linux_x86_64\.tar\.gz/ {print $1}' checksums.txt)
          SHA_ARM64_LINUX=$(awk '/1build_Linux_arm64\.tar\.gz/ {print $1}' checksums.txt)
          
          # Generate formula using Python to avoid sed compatibility issues
          python3 << 'PYTHON'
version = "${{ env.VERSION_NO_V }}"
sha_x86_darwin = "${{ env.SHA_X86_64_DARWIN }}"
sha_arm64_darwin = "${{ env.SHA_ARM64_DARWIN }}"
sha_x86_linux = "${{ env.SHA_X86_64_LINUX }}"
sha_arm64_linux = "${{ env.SHA_ARM64_LINUX }}"

formula = f"""# typed: false
# frozen_string_literal: true

class OneBuild < Formula
  desc "Frictionless way of managing project-specific commands"
  homepage "https://github.com/gopinath-langote/1build"
  version "{version}"

  on_macos do
    if Hardware::CPU.intel?
      url "https://github.com/gopinath-langote/1build/releases/download/v{version}/1build_Darwin_x86_64.tar.gz"
      sha256 "{sha_x86_darwin}"
    elsif Hardware::CPU.arm?
      url "https://github.com/gopinath-langote/1build/releases/download/v{version}/1build_Darwin_arm64.tar.gz"
      sha256 "{sha_arm64_darwin}"
    end
  end

  on_linux do
    if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
      url "https://github.com/gopinath-langote/1build/releases/download/v{version}/1build_Linux_x86_64.tar.gz"
      sha256 "{sha_x86_linux}"
    elsif Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
      url "https://github.com/gopinath-langote/1build/releases/download/v{version}/1build_Linux_arm64.tar.gz"
      sha256 "{sha_arm64_linux}"
    end
  end

  def install
    bin.install "1build"
  end

  test do
    system "#{bin}/1build", "--version"
  end
end
"""
with open('one-build.rb', 'w') as f:
    f.write(formula)
PYTHON
          
          # Commit and push
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add one-build.rb
          git commit -m "Brew formula update for 1build version $VERSION" || true
          git push origin master
        env:
          GITHUB_REF: ${{ github.ref }}
          VERSION_NO_V: ${{ github.ref_name }}
          SHA_X86_64_DARWIN: ${{ env.SHA_X86_64_DARWIN }}
          SHA_ARM64_DARWIN: ${{ env.SHA_ARM64_DARWIN }}
          SHA_X86_64_LINUX: ${{ env.SHA_X86_64_LINUX }}
          SHA_ARM64_LINUX: ${{ env.SHA_ARM64_LINUX }}


name: GoReleaser Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - uses: goreleaser/goreleaser-action@v5
        with:
          version: ">=2.0.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NO_V=${VERSION#v}
          
          # Clone the homebrew tap repo
          git clone https://${{ secrets.GORELEASER_GITHUB_TOKEN }}@github.com/gopinath-langote/homebrew-one-build.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          
          # Download checksums
          curl -sL https://github.com/gopinath-langote/1build/releases/download/$VERSION/1build_${VERSION_NO_V}_checksums.txt -o checksums.txt
          
          # Parse checksums
          SHA_X86_64_DARWIN=$(awk '/1build_Darwin_x86_64\.tar\.gz/ {print $1}' checksums.txt)
          SHA_ARM64_DARWIN=$(awk '/1build_Darwin_arm64\.tar\.gz/ {print $1}' checksums.txt)
          SHA_X86_64_LINUX=$(awk '/1build_Linux_x86_64\.tar\.gz/ {print $1}' checksums.txt)
          SHA_ARM64_LINUX=$(awk '/1build_Linux_arm64\.tar\.gz/ {print $1}' checksums.txt)
          
          # Generate formula
          cat > one-build.rb << 'EOF'
# typed: false
# frozen_string_literal: true

class OneBuild < Formula
  desc "Frictionless way of managing project-specific commands"
  homepage "https://github.com/gopinath-langote/1build"
  version "VERSION_PLACEHOLDER"

  on_macos do
    if Hardware::CPU.intel?
      url "https://github.com/gopinath-langote/1build/releases/download/vVERSION_PLACEHOLDER/1build_Darwin_x86_64.tar.gz"
      sha256 "SHA_X86_64_DARWIN_PLACEHOLDER"
    elsif Hardware::CPU.arm?
      url "https://github.com/gopinath-langote/1build/releases/download/vVERSION_PLACEHOLDER/1build_Darwin_arm64.tar.gz"
      sha256 "SHA_ARM64_DARWIN_PLACEHOLDER"
    end
  end

  on_linux do
    if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
      url "https://github.com/gopinath-langote/1build/releases/download/vVERSION_PLACEHOLDER/1build_Linux_x86_64.tar.gz"
      sha256 "SHA_X86_64_LINUX_PLACEHOLDER"
    elsif Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
      url "https://github.com/gopinath-langote/1build/releases/download/vVERSION_PLACEHOLDER/1build_Linux_arm64.tar.gz"
      sha256 "SHA_ARM64_LINUX_PLACEHOLDER"
    end
  end

  def install
    bin.install "1build"
  end

  test do
    system "#{bin}/1build", "--version"
  end
end
EOF
          
          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION_NO_V}/g" one-build.rb
          sed -i "s/SHA_X86_64_DARWIN_PLACEHOLDER/${SHA_X86_64_DARWIN}/g" one-build.rb
          sed -i "s/SHA_ARM64_DARWIN_PLACEHOLDER/${SHA_ARM64_DARWIN}/g" one-build.rb
          sed -i "s/SHA_X86_64_LINUX_PLACEHOLDER/${SHA_X86_64_LINUX}/g" one-build.rb
          sed -i "s/SHA_ARM64_LINUX_PLACEHOLDER/${SHA_ARM64_LINUX}/g" one-build.rb
          
          # Commit and push
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add one-build.rb
          git commit -m "Brew formula update for 1build version $VERSION" || echo "No changes to commit"
          git push origin master || echo "Failed to push - may need manual update"
        env:
          GITHUB_REF: ${{ github.ref }}

